services:
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./back-end
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://admin:password@mongo:27017/vocab-learn?authSource=admin
      JWT_SECRET: your-secret-key
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongo

  frontend:
    build: ./front-end
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data: