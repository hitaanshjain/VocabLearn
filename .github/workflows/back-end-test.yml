on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18.x"]

    services:
      mongodb:
        image: mongo:latest
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: back-end/package-lock.json

      - name: Install dependencies
        run: |
          cd back-end
          npm ci

      - name: Lint code
        run: |
          cd back-end
          npm run lint

      - name: Run tests
        env:
          MONGO_URI: mongodb://admin:password@localhost:27017/vocab-learn-test?authSource=admin
          JWT_SECRET: test-secret-key
          NODE_ENV: test
        run: |
          cd back-end
          npm test
